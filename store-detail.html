<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Toko — ERA-PLANOGRAM</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="topbar-back-btn">← Dashboard</a>
    </div>
    <div class="topbar-center">
      <div class="topbar-brand-pill"><span class="topbar-brand-full">ERAJAYA DIGITAL · REGION 5</span><span class="topbar-brand-short">ERAJAYA · R5</span></div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-green" id="export-btn" style="height:34px;font-size:12px;padding:0 14px">📥 Export</button>
    </div>
  </div>

  <div id="detail-content">

    <!-- INFO TOKO -->
    <div class="section">
      <div class="detail-header" id="detail-header">
        <span class="spinner"></span> Memuat data toko...
      </div>
    </div>

    <!-- GRID LDU PER BRAND -->
    <div class="section">
      <div class="section-title">Jumlah Unit LDU per Brand</div>
      <div class="ldu-grid" id="ldu-grid">
        <div style="color:var(--gray-400)">Memuat...</div>
      </div>
    </div>

  </div>

  <!-- DEVICE LIST MODAL -->
  <div class="device-modal-overlay" id="device-modal" style="display:none" onclick="closeDeviceModal(event)">
    <div class="device-modal-card">
      <div class="device-modal-header">
        <div>
          <div class="device-modal-title" id="modal-brand-title">—</div>
          <div class="device-modal-sub" id="modal-brand-sub">—</div>
        </div>
        <button class="device-modal-close" onclick="closeDeviceModal()">✕</button>
      </div>
      <div class="device-modal-body" id="modal-device-list">
        <div class="modal-empty">Memuat data...</div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    ERA-PLANOGRAM · VMD Region 5 · Erajaya Digital
  </footer>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/export.js"></script>
  <script src="assets/js/store-detail.js"></script>
</body>
</html>
