<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Toko — ERA-PLANOGRAM</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="topbar-back-btn">← Dashboard</a>
    </div>
    <div class="topbar-center">
      <div class="topbar-brand-pill"><span class="topbar-brand-full">ERAJAYA DIGITAL · REGION 5</span><span class="topbar-brand-short">ERAJAYA · R5</span></div>
    </div>
    <div class="topbar-right" style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      <a id="inv-btn" href="#" style="display:inline-flex;align-items:center;gap:5px;background:#6366f1;color:#fff;font-weight:700;font-size:13px;padding:0 14px;height:34px;border-radius:8px;text-decoration:none;white-space:nowrap;box-shadow:0 2px 6px rgba(99,102,241,.4)">📋 Inventory</a>
      <button class="btn btn-green" id="export-btn" style="height:34px;font-size:13px;padding:0 14px;white-space:nowrap">📥 Export</button>
    </div>
  </div>

  <div id="detail-content">

    <!-- INFO TOKO -->
    <div class="section">
      <div class="detail-header" id="detail-header">
        <span class="spinner"></span> Memuat data toko...
      </div>
    </div>

    <!-- TAB ROW -->
    <div class="section" style="padding-bottom:0">
      <div class="detail-tab-row">
        <button class="detail-tab active" id="tab-btn-ldu" onclick="setDetailTab('ldu')">📊 LDU per Brand</button>
        <button class="detail-tab" id="tab-btn-foto" onclick="setDetailTab('foto')">📷 Foto LDU &amp; Wallbay</button>
      </div>
    </div>

    <!-- GRID LDU PER BRAND -->
    <div class="section" id="tab-ldu-section">
      <div class="section-title">Jumlah Unit LDU per Brand</div>
      <div class="ldu-grid" id="ldu-grid">
        <div style="color:var(--gray-400)">Memuat...</div>
      </div>
    </div>

    <!-- FOTO GALLERY -->
    <div class="section" id="tab-foto-section" style="display:none">
      <div class="section-title">Foto LDU &amp; Wallbay per Brand</div>
      <div id="foto-gallery-container">
        <div style="color:var(--gray-400);font-size:13px">Belum ada foto yang diupload.</div>
      </div>
    </div>

  </div>

  <!-- BRAND DETAIL MODAL -->
  <div class="device-modal-overlay" id="device-modal" style="display:none" onclick="closeDeviceModal(event)">
    <div class="device-modal-card">
      <div class="device-modal-header">
        <div>
          <div class="device-modal-title" id="modal-brand-title">—</div>
          <div class="device-modal-sub" id="modal-brand-sub">—</div>
        </div>
        <button class="device-modal-close" onclick="closeDeviceModal()">✕</button>
      </div>
      <!-- Status chips -->
      <div id="modal-status-row" style="display:none;gap:8px;padding:12px 20px;border-bottom:1px solid var(--gray-100);flex-wrap:wrap"></div>
      <!-- Foto section -->
      <div id="modal-foto-row" style="display:none;padding:14px 20px;border-bottom:1px solid var(--gray-100);gap:12px"></div>
      <!-- Device list -->
      <div class="device-modal-body" id="modal-device-list">
        <div class="modal-empty">Memuat data...</div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    ERA-PLANOGRAM · VMD Region 5 · Erajaya Digital
  </footer>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/export.js"></script>
  <script src="assets/js/store-detail.js"></script>
</body>
</html>
